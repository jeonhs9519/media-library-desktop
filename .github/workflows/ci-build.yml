name: CI — Build Electron ZIP

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip lifecycle scripts)
        run: npm ci --ignore-scripts
        shell: pwsh

      - name: Build app (renderer & main)
        run: npm run build
        shell: pwsh

      - name: Bundle main process (esbuild)
        run: npm run bundle:main
        shell: pwsh

      - name: Prepare native deps for Electron
        run: npx electron-builder install-app-deps
        shell: pwsh

      - name: Ensure Electron present for packaging
        run: npm i --no-save electron@^40.6.0
        shell: pwsh

      - name: Build Windows ZIP artifact
        run: npx electron-builder --win zip --x64 --publish never
        shell: pwsh

      - name: Publish or Update GitHub Release (ZIP)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: Automated release for ${{ github.ref_name }}
          files: dist/*.zip
