name: CI — Build Electron ZIP

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip lifecycle scripts)
        run: npm ci --ignore-scripts
        shell: pwsh

      - name: Build app (renderer & main)
        run: npm run build
        shell: pwsh

      - name: Bundle main process (esbuild)
        run: npm run bundle:main
        shell: pwsh

      - name: Prepare native deps for Electron
        run: npx electron-builder install-app-deps
        shell: pwsh

      - name: Ensure Electron present for packaging
        run: npm i --no-save electron@^40.6.0
        shell: pwsh

      - name: Build Windows ZIP artifact
        run: npx electron-builder --win zip --x64 --publish never
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-latest
          path: dist/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Automated release for ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find ZIP artifact
        if: startsWith(github.ref, 'refs/tags/')
        id: find_zip
        run: |
          $zip = Get-ChildItem dist -Filter '*.zip' -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $zip) { Write-Error 'No ZIP found in dist'; exit 1 }
          $name = Split-Path $zip -Leaf
          Write-Output "Found ZIP: $zip"
          echo "::set-output name=zip_path::$zip"
          echo "::set-output name=zip_name::$name"
        shell: pwsh

      - name: Upload Release Asset (ZIP)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_zip.outputs.zip_path }}
          asset_name: ${{ steps.find_zip.outputs.zip_name }}
          asset_content_type: application/octet-stream
