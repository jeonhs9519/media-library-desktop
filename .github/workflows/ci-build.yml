name: CI - Build Electron ZIP

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload dist ZIP as a short-lived Actions artifact'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-electron-zip-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $expectedTag = "v$packageVersion"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            Write-Error "Tag ${{ github.ref_name }} does not match package.json version $packageVersion. Expected $expectedTag."
            exit 1
          }

      - name: Verify release notes file
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $notesPath = "docs/release-notes/${{ github.ref_name }}.md"
          if (!(Test-Path $notesPath)) {
            Write-Error "Missing release notes file: $notesPath. Run npm run release:patch so the release commit includes it."
            exit 1
          }

          $firstLine = Get-Content $notesPath -TotalCount 1
          if ($firstLine -ne "## 릴리즈 개요") {
            Write-Error "Release notes must start with '## 릴리즈 개요' to avoid duplicate GitHub Release titles."
            exit 1
          }
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Electron & electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        shell: pwsh

      - name: Run unit tests
        run: npm test
        shell: pwsh

      - name: Build app (renderer & main)
        run: npm run build
        shell: pwsh

      - name: Bundle main process (esbuild)
        run: npm run bundle:main
        shell: pwsh

      - name: Prepare native deps for Electron
        run: npx electron-builder install-app-deps
        shell: pwsh

      - name: Build Windows ZIP artifact
        run: npx electron-builder --win zip --x64 --publish never
        shell: pwsh

      - name: Verify ZIP artifact
        shell: pwsh
        run: |
          $zipFiles = Get-ChildItem -Path dist -Filter '*.zip' -File
          if ($zipFiles.Count -ne 1) {
            Write-Error "Expected exactly one ZIP artifact in dist, found $($zipFiles.Count)."
            $zipFiles | ForEach-Object { Write-Host "Found ZIP: $($_.FullName)" }
            exit 1
          }

          if ($zipFiles[0].Length -le 0) {
            Write-Error "ZIP artifact is empty: $($zipFiles[0].FullName)"
            exit 1
          }

          Write-Host "ZIP artifact ready: $($zipFiles[0].Name) ($($zipFiles[0].Length) bytes)"

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch' && inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-latest
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 3

      - name: Publish or Update GitHub Release (ZIP)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: docs/release-notes/${{ github.ref_name }}.md
          files: dist/*.zip
          fail_on_unmatched_files: true
