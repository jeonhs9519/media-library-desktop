name: CI — Build Electron Portable

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip lifecycle scripts)
        run: npm ci --ignore-scripts
        shell: pwsh

      - name: Build app (renderer & main)
        run: npm run build
        shell: pwsh

      - name: Prepare native deps for Electron
        run: npx electron-builder install-app-deps
        shell: pwsh

      - name: Build Windows portable artifact
        run: npx electron-builder --win portable --x64
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-latest
          path: dist/**

      - name: Pack dist for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist\* -DestinationPath release-dist.zip -Force
        shell: pwsh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Automated release for ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (dist zip)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-dist.zip
          asset_name: release-dist.zip
          asset_content_type: application/zip
