name: CI — Build Electron Portable

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip lifecycle scripts)
        run: npm ci --ignore-scripts
        shell: pwsh

      - name: Build app (renderer & main)
        run: npm run build
        shell: pwsh

      - name: Bundle main process (esbuild)
        run: npm run bundle:main
        shell: pwsh

      - name: Prepare native deps for Electron
        run: npx electron-builder install-app-deps
        shell: pwsh

      - name: Ensure Electron present for packaging
        run: npm i --no-save electron@^40.6.0
        shell: pwsh

      - name: Prune devDependencies (production only)
        run: npm prune --production
        shell: pwsh

      - name: Build Windows portable artifact
        run: npx electron-builder --win portable --x64
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-latest
          path: dist/**

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Automated release for ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find portable EXE
        if: startsWith(github.ref, 'refs/tags/')
        id: find_exe
        run: |
          $exe = Get-ChildItem dist -Filter '*.exe' -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { Write-Error 'No EXE found in dist'; exit 1 }
          $name = Split-Path $exe -Leaf
          Write-Output "Found EXE: $exe"
          echo "::set-output name=exe_path::$exe"
          echo "::set-output name=exe_name::$name"
        shell: pwsh

      - name: Upload Release Asset (portable EXE)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_exe.outputs.exe_path }}
          asset_name: ${{ steps.find_exe.outputs.exe_name }}
          asset_content_type: application/octet-stream
