name: CI — Build Electron Portable

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip lifecycle scripts)
        run: npm ci --ignore-scripts
        shell: pwsh

      - name: Prepare native deps for Electron (debug)
        run: npx electron-builder install-app-deps --debug
        shell: pwsh

      - name: Build Windows portable artifact
        run: npx electron-builder --win portable --x64
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-latest
          path: dist/**
