name: Create or Update Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update, for example v0.0.7'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-notes-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Create or update GitHub Release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like v0.0.7. Received: $TAG" >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag does not exist in this repository: $TAG" >&2
            exit 1
          fi

      - name: Verify release notes file
        shell: bash
        run: |
          set -euo pipefail
          NOTES_PATH="docs/release-notes/${{ inputs.tag }}.md"

          if [[ ! -f "$NOTES_PATH" ]]; then
            echo "Missing release notes file: $NOTES_PATH" >&2
            echo "Run npm run release:patch so the release commit includes it, or add the file before rerunning this workflow." >&2
            exit 1
          fi

          FIRST_LINE="$(head -n 1 "$NOTES_PATH")"
          if [[ "$FIRST_LINE" != "## 릴리즈 개요" ]]; then
            echo "Release notes must start with '## 릴리즈 개요' to avoid duplicate GitHub Release titles." >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: docs/release-notes/${{ inputs.tag }}.md
