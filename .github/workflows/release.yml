name: Create or Update Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update, for example v0.0.7'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-notes-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Create or update GitHub Release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like v0.0.7. Received: $TAG" >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag does not exist in this repository: $TAG" >&2
            exit 1
          fi

      - name: Build Korean release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1 || true)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}")
          else
            COMMITS=$(git log --pretty=format:'- %s (%h)' "${TAG}")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS='- 변경 내역 없음'
          fi

          {
            echo "## 릴리즈 개요"
            echo "- 버전: ${TAG}"
            if [ -n "$PREV_TAG" ]; then
              echo "- 비교 기준: ${PREV_TAG}"
            else
              echo "- 비교 기준: 첫 릴리즈"
            fi
            echo
            echo "## 변경 사항"
            echo "$COMMITS"
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: RELEASE_NOTES.md
