name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Korean release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1 || true)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}")
          else
            COMMITS=$(git log --pretty=format:'- %s (%h)' "${TAG}")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS='- 변경 내역 없음'
          fi

          {
            echo "## 릴리즈 개요"
            echo "- 버전: ${TAG}"
            if [ -n "$PREV_TAG" ]; then
              echo "- 비교 기준: ${PREV_TAG}"
            else
              echo "- 비교 기준: 첫 릴리즈"
            fi
            echo
            echo "## 변경 사항"
            echo "$COMMITS"
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md